name: Security Scan

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  schedule:
    - cron: "0 0 * * 0" # Run weekly on Sundays

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20.x"
          cache: "yarn"

      # This step forces Git to download dependencies using `https://` protocol,
      # even if `yarn.lock` refers to packages via `git://` or `ssh://`. CI has
      # no SSH keys, so SSH URLs (e.g. thesis/solidity-contracts) would fail.
      - name: Force HTTPS for git protocol
        run: |
          git config --global url."https://".insteadOf git://
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-optional

      - name: Configure registry for npm and yarn
        run: |
          npm config set registry https://registry.npmjs.org/
          yarn config set registry https://registry.npmjs.org/

      - name: Run audit-ci (high severity, prod deps) with retries
        shell: bash
        run: |
          set -euo pipefail
          AUDIT_ARGS=(npx --yes audit-ci --config .audit-ci.json)
          for attempt in 1 2 3; do
            echo "Running audit-ci (attempt $attempt)..."
            if "${AUDIT_ARGS[@]}"; then
              exit 0
            fi
            echo "audit-ci failed (attempt $attempt). Retrying in 10s..."
            sleep 10
          done
          echo "audit-ci failed after 3 attempts."
          exit 1

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v3
        with:
          languages: javascript, typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v3
