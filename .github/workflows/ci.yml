name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20.x"
          cache: "yarn"

      # This step forces Git to download dependencies using `https://` protocol,
      # even if `yarn.lock` refers to packages via `git://` or `ssh://`. CI has
      # no SSH keys, so SSH URLs (e.g. thesis/solidity-contracts) would fail.
      - name: Force HTTPS for git protocol
        run: |
          git config --global url."https://".insteadOf git://
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Detect unused dependencies
        run: yarn depcheck

      - name: Build (type-check + compile)
        run: yarn build

      - name: Lint
        run: yarn lint

      - name: Format check
        run: yarn format

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [static]

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20.x"
          cache: "yarn"

      # This step forces Git to download dependencies using `https://` protocol,
      # even if `yarn.lock` refers to packages via `git://` or `ssh://`. CI has
      # no SSH keys, so SSH URLs (e.g. thesis/solidity-contracts) would fail.
      - name: Force HTTPS for git protocol
        run: |
          git config --global url."https://".insteadOf git://
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-optional

      - name: Build
        run: yarn build

      - name: Setup .env file
        run: cp env.example .env

      - name: Start Docker Compose services
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build

      - name: Wait for services to become healthy
        run: .github/scripts/wait-for-healthy-services.sh
        shell: bash

      - name: Validate configuration
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm tbtc-relayer-dev yarn run validate-config

      - name: Reset database
        run: npx prisma migrate reset --force --skip-seed --skip-generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tbtc_relayer?schema=public

      - name: Run tests
        run: yarn test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tbtc_relayer?schema=public

      - name: Stop Docker Compose services
        if: always()
        run: |
          [ -f env.example ] && cp env.example .env || true
          docker compose -f docker-compose.yml -f docker-compose.ci.yml down --remove-orphans

      - name: Upload coverage as artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
